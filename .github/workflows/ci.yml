# CI workflow for the Forge scaffold.
# Runs `xcodebuild -scheme Forge -destination 'platform=macOS' build`
# and `xcodebuild test -scheme Forge -destination 'platform=macOS'`
# on every push and pull_request, on a macos-14 runner with Xcode 26.5.
name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build & Test (macOS)
    runs-on: macos-14
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Show macOS / runner toolchain
        run: |
          sw_vers
          uname -a

      - name: Select Xcode 26.5
        run: |
          # Prefer the GitHub Actions pre-installed Xcode 26.5; fall back to whatever is
          # currently selected so the scaffold still builds on runners that predate 26.5.
          if [ -d "/Applications/Xcode_26.5.app" ]; then
            sudo xcode-select -s "/Applications/Xcode_26.5.app/Contents/Developer"
          else
            echo "Xcode_26.5.app not found; using default Xcode ($(xcode-select -p))."
          fi
          xcodebuild -version
          xcrun --show-sdk-version --sdk macosx

      - name: Cache Swift Package Manager artifacts
        uses: actions/cache@v4
        with:
          path: |
            .build
            Packages/*/.build
            ~/Library/Caches/org.swift.swiftpm
            ~/Library/org.swift.swiftpm
          key: ${{ runner.os }}-spm-${{ hashFiles('Packages/**/*.swift', 'Package.resolved', 'Forge/**/*.swift') }}
          restore-keys: |
            ${{ runner.os }}-spm-

      - name: Resolve SPM dependencies
        run: |
          xcodebuild \
            -project Forge.xcodeproj \
            -scheme Forge \
            -resolvePackageDependencies

      - name: Build Forge
        run: |
          set -o pipefail
          xcodebuild \
            -project Forge.xcodeproj \
            -scheme Forge \
            -destination 'platform=macOS' \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            build

      - name: Test Forge
        run: |
          set -o pipefail
          xcodebuild \
            -project Forge.xcodeproj \
            -scheme Forge \
            -destination 'platform=macOS' \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            test
